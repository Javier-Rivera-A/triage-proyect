spring.application.name=triage_back

# ?? Base de datos ?????????????????????????????????????????????????????????????
# Los valores después de ":" son los defaults para desarrollo local.
# Docker Compose los sobreescribe con variables de entorno.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/triage}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA ???????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ?? JWT ???????????????????????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET:clave-super-secreta-triage-sistema-universidad-2024-xyz}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ?? Servidor ??????????????????????????????????????????????????????????????????
server.port=8080
# CRÍTICO: SIN context-path ? el nginx.conf ya hace proxy a /api ? backend:8080
# Si dejamos /api aquí, las rutas quedan /api/auth/login en vez de /auth/login
# y el nginx no las encuentra

spring.main.allow-circular-references=true
logging.level.com.universidad.triage_back=DEBUG
logging.level.org.springframework.security=INFO