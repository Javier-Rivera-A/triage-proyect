spring.application.name=triage_back

# Base de datos
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/triage_db}

spring.datasource.username=${DB_USERNAME:postgres}

spring.datasource.password=${DB_PASSWORD:admin}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT — en produccion setear JWT_SECRET como variable de entorno (min 32 chars)
jwt.secret=${JWT_SECRET:triage-dev-secret-key-must-be-at-least-32-chars!!}

jwt.expiration=${JWT_EXPIRATION:86400000}


# Servidor
server.port=8080
server.servlet.context-path=/api

# CORS
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:4200}


# Logging
logging.level.com.universidad.triage_back=${LOG_LEVEL:INFO}

logging.level.org.springframework.security=WARN


spring.main.allow-circular-references=true